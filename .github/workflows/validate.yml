name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files
        run: |
          python -m json.tool hacs.json > /dev/null
          python -m json.tool custom_components/fishing_score_assistant/manifest.json > /dev/null
          python -m json.tool custom_components/fishing_score_assistant/strings.json > /dev/null
          python -m json.tool custom_components/fishing_score_assistant/translations/en.json > /dev/null
          python -m json.tool custom_components/fishing_score_assistant/translations/fr.json > /dev/null
